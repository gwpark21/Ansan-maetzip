<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안산시 생생 맛집 지도</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Leaflet.js JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            padding: 4px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
        }
        .leaflet-popup-content {
            margin: 8px 12px;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 내 위치 및 학교 마커 펄스 애니메이션 효과 */
        .gps-pulse {
            width: 14px;
            height: 14px;
            background: #3b82f6;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-emerald-600 text-white px-6 py-4 shadow-md flex items-center justify-between shrink-0">
        <div class="flex items-center space-x-3">
            <div class="bg-white p-2 rounded-lg text-emerald-600"><i data-lucide="map-pin" class="w-6 h-6"></i></div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">안산시 생생 맛집 지도</h1>
                <p class="text-xs text-emerald-100 font-medium">🏫 원곡고등학교 교사 건물 기준 정확한 거리 측정 및 정렬</p>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        <!-- Sidebar -->
        <aside class="w-full md:w-96 bg-white border-r border-slate-200 flex flex-col shrink-0 z-[1000] md:z-10 shadow-lg md:shadow-none max-h-[40vh] md:max-h-full">
            <div class="p-4 border-b border-slate-100 bg-slate-50 space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">1. 지역구 선택</label>
                        <select id="districtFilter" onchange="applyFilters()" class="w-full px-3 py-2 text-sm bg-white border border-slate-200 rounded-lg">
                            <option value="all">전체 지역</option>
                            <option value="단원구">단원구</option>
                            <option value="상록구">상록구</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">2. 맛집 종류</label>
                        <select id="categoryFilter" onchange="applyFilters()" class="w-full px-3 py-2 text-sm bg-white border border-slate-200 rounded-lg">
                            <option value="all">전체 분류</option>
                        </select>
                    </div>
                </div>
                <div class="flex items-center justify-between pt-1">
                    <div class="text-xs text-slate-500 font-medium">검색 결과: <span id="restaurantCount" class="text-emerald-600 font-bold">0</span>개소</div>
                    <button onclick="resetFilters()" class="text-xs text-slate-400 hover:text-emerald-600 flex items-center space-x-1"><i data-lucide="rotate-ccw" class="w-3 h-3"></i><span>초기화</span></button>
                </div>
            </div>
            
            <!-- Restaurant List -->
            <div class="flex-1 overflow-y-auto no-scrollbar" id="restaurantListContainer">
                <div id="emptyState" class="hidden p-8 text-center text-slate-400"><p class="text-sm">조건에 맞는 맛집이 없습니다.</p></div>
                <div class="divide-y divide-slate-100" id="restaurantList"></div>
            </div>
        </aside>

        <!-- Map -->
        <main class="flex-1 relative h-full">
            <div id="map" class="w-full h-full"></div>
            
            <!-- GPS Floating Button -->
            <button onclick="trackMyLocation()" class="absolute top-4 right-4 bg-white text-slate-700 hover:text-emerald-600 border border-slate-200 p-3 rounded-xl shadow-xl z-[1000] flex items-center space-x-2 font-bold text-xs transition-transform active:scale-95 bg-white/95 backdrop-blur-sm">
                <i data-lucide="locate" class="w-4 h-4 text-emerald-500"></i>
                <span>내 위치 찾기</span>
            </button>
        </main>
    </div>

    <script>

        // 천교의 경도가 126.797240이므로, 원곡고 건물은 그 바로 수직 위(북쪽)인 lat: 37.33385, lng: 126.797240 부근에 정렬됩니다.
        const WONGOK_HIGH_SCHOOL = { lat: 37.33385, lng: 126.797240 };

            },
            {

                summary: "가성비 좋고 신선한 제철 활어회 전문",

                desc: "깊은 맛의 사골 육수에 손수 뽑은 야들야들한 칼국수 면과 바로 담근 매콤알싸한 마늘 겉절이 김치가 엄청난 짝꿍을 이루는 명소입니다.",
                summary: "쫄깃한 손면과 진한 사골 육수의 환상 조합",
                phone: "031-482-1002",
                address: "경기도 안산시 단원구 고잔2길 41",
                seats: "70석",
                parking: "주변 중앙동 공영 주차장 지원",
                holiday: "명절 연휴 당일들",
                category: "한식",
                district: "단원구",
                lat: 37.318283,
                lng: 126.836102
            },
            {
                name: "천교(원곡동)",
                desc: "원곡동 다문화거리에 위치한 중국 정통 훠궈 및 사천식/동북식 볶음 요리 전문점입니다. 정통 마라 소스에 담긴 다채로운 훠궈 재료를 무제한으로 푸짐하게 즐길 수 있습니다.",
                summary: "원곡동 다문화거리 속 진짜 중국 요리 식당",
                phone: "031-492-3689",
                address: "경기도 안산시 단원구 원곡로 23",
                seats: "룸 3개 (30석) / 홀 66석",
                parking: "역 부근 공영주차장 활용",
                holiday: "연중무휴",
                category: "중식",
                district: "단원구",
                lat: 37.332152,
                lng: 126.797240
            }
        ];

        let map;
        let activeMarkers = [];
        let userLocationMarker = null;

        // 두 좌표 간의 직선 거리(Haversine 공식) 구하기 함수
        function calculateHaversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // 지구 반지름 (km)
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // km 단위 반환
        }

        // 거리 텍스트 보기 좋게 가공
        function formatDistanceText(kmValue) {
            if (kmValue < 1) {
                return `${Math.round(kmValue * 1000)}m`;
            }
            return `${kmValue.toFixed(2)}km`;
        }

        // 초기 맛집 데이터 전처리 (원곡고등학교 건물 기준 거리 정보 계산 후 추가)
        rawRestaurants.forEach(r => {
            const distance = calculateHaversineDistance(WONGOK_HIGH_SCHOOL.lat, WONGOK_HIGH_SCHOOL.lng, r.lat, r.lng);
            r.distanceToWongok = distance;
            r.distanceStr = formatDistanceText(distance);
        });

        // 원곡고등학교 기준 가까운 순으로 사전 정렬
        rawRestaurants.sort((a, b) => a.distanceToWongok - b.distanceToWongok);

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            initMap();
            populateCategoryFilter();
            applyFilters();
        });

        function initMap() {
            // 원곡고등학교를 중심으로 맵 로드
            map = L.map('map', { center: [WONGOK_HIGH_SCHOOL.lat, WONGOK_HIGH_SCHOOL.lng], zoom: 16, zoomControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            // 🏫 원곡고등학교 특수 전용 마커 추가
            const schoolIcon = L.divIcon({
                className: 'custom-school-icon',
                html: `
                    <div class="relative flex items-center justify-center" style="transform: translate(-10px, -24px);">
                        <span class="absolute w-5 h-1.5 bg-black/30 rounded-full blur-[1.5px] translate-y-7 scale-y-[0.3]"></span>
                        <div class="w-8 h-10 rounded-full rounded-bl-none rotate-45 flex items-center justify-center shadow-lg border-2 border-white bg-indigo-600">
                            <div class="-rotate-45 text-white flex items-center justify-center">
                                <span style="font-size: 11px;">🏫</span>
                            </div>
                        </div>
                    </div>
                `,
                iconSize: [30, 42]
            });

            L.marker([WONGOK_HIGH_SCHOOL.lat, WONGOK_HIGH_SCHOOL.lng], { icon: schoolIcon })
                .addTo(map)
                .bindPopup(`
                    <div class="text-slate-800 font-sans p-1 text-center" style="min-width: 150px;">
                        <span class="text-[10px] bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded-full font-bold">원곡고 교사 건물</span>
                        <h4 class="font-bold text-sm text-slate-900 mt-1">원곡고등학교</h4>
                        <p class="text-[10px] text-slate-400 font-semibold">경기도 안산시 단원구 화랑로 15</p>
                    </div>
                `).openPopup();
        }

        // 실시간 내 GPS 위치 추적
        function trackMyLocation() {
            if (!navigator.geolocation) {
                alert("이 브라우저는 실시간 위치 정보 찾기를 지원하지 않습니다.");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    if (userLocationMarker) {
                        map.removeLayer(userLocationMarker);
                    }

                    const myLocationIcon = L.divIcon({
                        className: 'custom-gps-icon',
                        html: `<div class="gps-pulse"></div>`,
                        iconSize: [14, 14],
                        iconAnchor: [7, 7]
                    });

                    userLocationMarker = L.marker([lat, lng], { icon: myLocationIcon })
                        .addTo(map)
                        .bindPopup("<div class='text-xs font-bold text-blue-600 text-center p-1'>📍 현재 나의 위치</div>")
                        .openPopup();

                    map.setView([lat, lng], 15, { animate: true });
                },
                (error) => {
                    alert("위치 탐색에 실패하였습니다. 브라우저 위치 권한을 확인해 주세요.");
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function populateCategoryFilter() {
            const categories = [...new Set(rawRestaurants.map(r => r.category))];
            const selectElement = document.getElementById('categoryFilter');
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat; opt.textContent = cat;
                selectElement.appendChild(opt);
            });
        }

        function applyFilters() {
            const districtVal = document.getElementById('districtFilter').value;
            const categoryVal = document.getElementById('categoryFilter').value;

            activeMarkers.forEach(item => map.removeLayer(item.marker));
            activeMarkers = [];

            const filtered = rawRestaurants.filter(r => {
                const districtMatch = (districtVal === 'all') || (r.district === districtVal);
                const categoryMatch = (categoryVal === 'all') || (r.category === categoryVal);
                return districtMatch && categoryMatch;
            });

            const listContainer = document.getElementById('restaurantList');
            const emptyState = document.getElementById('emptyState');
            listContainer.innerHTML = '';
            document.getElementById('restaurantCount').textContent = filtered.length;

            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filtered.forEach((rest, index) => {
                    const marker = createCustomMarker(rest);
                    activeMarkers.push({ data: rest, marker: marker });
                    const listItem = createListItem(rest, index);
                    listContainer.appendChild(listItem);
                });
            }

            // 지도 시점 원곡고 및 맛집들이 모두 보이도록 조절
            if (activeMarkers.length > 0) {
                const groupElements = activeMarkers.map(m => m.marker);
                const schoolMarker = L.marker([WONGOK_HIGH_SCHOOL.lat, WONGOK_HIGH_SCHOOL.lng]);
                groupElements.push(schoolMarker);

                const group = new L.featureGroup(groupElements);
                map.fitBounds(group.getBounds().pad(0.15));
            } else {
                map.setView([WONGOK_HIGH_SCHOOL.lat, WONGOK_HIGH_SCHOOL.lng], 16);
            }
        }

        function getCategoryColor(category) {
            switch(category) {
                case '한식': return '#10b981'; // emerald
                case '중식': return '#ef4444'; // red
                case '횟집': return '#3b82f6'; // blue
                case '양식': return '#f59e0b'; // amber
                default: return '#8b5cf6'; // purple
            }
        }

        function createCustomMarker(rest) {
            const color = getCategoryColor(rest.category);
            const customIcon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="relative flex items-center justify-center" style="transform: translate(-10px, -24px);"><div class="w-7 h-9 rounded-full rounded-bl-none rotate-45 flex items-center justify-center shadow-md border border-white" style="background-color: ${color};"><div class="-rotate-45 text-white flex items-center justify-center font-bold text-[10px]">${rest.category.charAt(0)}</div></div></div>`,
                iconSize: [30, 42]
            });

            const popupContent = `
                <div class="text-slate-800 font-sans" style="min-width: 270px; max-width: 320px;">
                    <div class="flex items-center justify-between gap-1 mb-1.5">
                        <span class="px-2 py-0.5 text-[10px] font-bold rounded-full text-white" style="background-color: ${getCategoryColor(rest.category)}">
                            ${rest.category}
                        </span>
                        <!-- 🏫 원곡고 기준 하이라이트 거리 뱃지 -->
                        <span class="text-[10px] bg-indigo-50 text-indigo-700 font-bold px-1.5 py-0.5 rounded">
                            🏫 원곡고에서 ${rest.distanceStr}
                        </span>
                    </div>
                    <h3 class="text-sm font-bold text-slate-900 mb-1">${rest.name}</h3>
                    <p class="text-xs text-slate-500 bg-slate-50 p-2 my-1.5 rounded leading-relaxed border border-slate-100">${rest.desc}</p>
                    <div class="space-y-1 text-xs border-t border-slate-100 pt-2">
                        <div><b>📞 전화번호:</b> <span class="text-emerald-700 font-medium">${rest.phone}</span></div>
                        <div><b>📍 주소지:</b> <span class="text-slate-600">${rest.address}</span></div>
                        <div><b>🪑 좌석수:</b> <span class="text-slate-600">${rest.seats}</span></div>
                        <div><b>🚗 주차장:</b> <span class="text-slate-600">${rest.parking}</span></div>
                        <div><b>📅 휴무일:</b> <span class="text-rose-500 font-semibold">${rest.holiday}</span></div>
                    </div>
                </div>`;

            return L.marker([rest.lat, rest.lng], { icon: customIcon }).addTo(map).bindPopup(popupContent);
        }

        function createListItem(rest, idx) {
            const card = document.createElement('div');
            card.className = "p-4 hover:bg-slate-50 cursor-pointer flex flex-col justify-between border-l-4 border-transparent hover:border-emerald-500 transition-all";
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <span class="text-[10px] font-bold text-white px-1.5 py-0.5 rounded" style="background-color: ${getCategoryColor(rest.category)}">${rest.category}</span>
                    <!-- 리스트 내에서도 거리를 우선 강조 표시 -->
                    <span class="text-[10.5px] font-bold text-indigo-600 flex items-center">
                        <i data-lucide="navigation" class="w-3 h-3 mr-0.5 fill-indigo-200"></i>
                        원곡고에서 ${rest.distanceStr}
                    </span>
                </div>
                <h4 class="font-bold text-slate-800 text-sm mt-1.5">${rest.name}</h4>
                <p class="text-xs text-slate-400 mt-1">${rest.summary}</p>
                <div class="mt-2 flex items-center justify-between text-[11px] text-slate-500">
                    <span class="flex items-center"><i data-lucide="phone" class="w-3 h-3 mr-1"></i>${rest.phone}</span>
                    <span class="text-slate-400 text-[10px]">${rest.district}</span>
                </div>
            `;
            card.addEventListener('click', () => {
                const target = activeMarkers.find(m => m.data.name === rest.name);
                if (target) { 
                    map.setView([rest.lat, rest.lng], 16, { animate: true }); 
                    target.marker.openPopup(); 
                }
            });

            setTimeout(() => { lucide.createIcons({ node: card }); }, 0);
            return card;
        }

        function resetFilters() {
            document.getElementById('districtFilter').value = 'all';
            document.getElementById('categoryFilter').value = 'all';
            applyFilters();
        }
    </script>
</body>
</html>
